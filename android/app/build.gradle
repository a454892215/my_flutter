// 1. 修改点：使用 plugins 块替代旧的 apply 语法
plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.quick.my_flutter_02" // 建议增加 namespace，适配 AGP 7.0+
    compileSdkVersion 34
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

//    sourceSets {
//        main.java.srcDirs += 'src/main/kotlin'
//    }

    sourceSets {
        // 修改点：显式声明 java 目录。
        // 注意：不要在 src/main/java 目录下手动放置 GeneratedPluginRegistrant.java
        main.java.srcDirs = ['src/main/java']
        // 建议保留 kotlin 路径声明，因为部分 Flutter 插件可能生成 Kotlin 代码
        main.kotlin.srcDirs = ['src/main/kotlin']
    }
    defaultConfig {
        applicationId "com.flt.my_flutter_lib_3"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 34
        versionCode flutter.versionCode
        versionName flutter.versionName
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}

dependencies {
// 修改后（推荐方式）：直接使用标准库，不带版本号，Gradle 会自动对齐 plugins 块中的版本
    implementation "org.jetbrains.kotlin:kotlin-stdlib"
    implementation "org.jetbrains.kotlin:kotlin-stdlib"
    // 显式引入 androidx 注解库，解决 GeneratedPluginRegistrant 的报错
    implementation "androidx.annotation:annotation:1.7.0"
}
